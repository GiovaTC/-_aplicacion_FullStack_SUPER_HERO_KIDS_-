<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <title>SUPER HERO KIDS</title>

    <link rel="stylesheet" href="css/styles.css">

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>

<body>

<div class="container mt-5">

    <h1 class="titulo">
        SUPER HERO KIDS
    </h1>

    <div class="card p-4 shadow">

        <input
                type="text"
                id="nombre"
                class="form-control mb-3"
                placeholder="Nombre héroe">

        <input
                type="text"
                id="poder"
                class="form-control mb-3"
                placeholder="Poder">

        <input
                type="number"
                id="nivel"
                class="form-control mb-3"
                placeholder="Nivel">

        <input
                type="text"
                id="universo"
                class="form-control mb-3"
                placeholder="Universo">

        <button
                class="btn btn-primary"
                onclick="guardarHeroe()">

            Guardar

        </button>

    </div>

    <table class="table table-dark table-hover mt-4">

        <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Poder</th>
            <th>Nivel</th>
            <th>Universo</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody id="tablaHeroes">
        </tbody>

    </table>

</div>

<script src="js/app.js"></script>

</body>
</html>
